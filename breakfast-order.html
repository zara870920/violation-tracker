<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>早餐點餐系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root {
  --bg:#FFF8F0;--card:#fff;--primary:#FF6B35;--primary-light:#FFE8DF;
  --primary-dark:#E55A26;--text:#1A1A1A;--muted:#888;--border:#EEE;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh;}
.header{background:var(--primary);color:#fff;padding:20px 20px 28px;text-align:center;}
.header-emoji{font-size:2.4rem;display:block;margin-bottom:6px;}
.header h1{font-size:1.4rem;font-weight:700;}
.header p{font-size:.85rem;opacity:.85;margin-top:4px;}
.deadline-badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:.8rem;margin-top:10px;}
main{max-width:480px;margin:0 auto;padding:20px 16px 140px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
.card-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;color:var(--primary);text-transform:uppercase;margin-bottom:10px;}
.input-field{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;font-family:inherit;color:var(--text);background:#FAFAFA;outline:none;transition:border-color .2s;}
.input-field:focus{border-color:var(--primary);background:#fff;}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.shop-btn{border:2px solid var(--border);border-radius:12px;padding:14px 10px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;}
.shop-btn:hover{border-color:var(--primary-light);transform:translateY(-1px);}
.shop-btn.selected{border-color:var(--primary);background:var(--primary-light);}
.shop-btn .shop-icon{font-size:1.8rem;display:block;margin-bottom:5px;}
.shop-btn .shop-name{font-size:.9rem;font-weight:700;}
.shop-btn .shop-tag{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* 品項分類 */
.category-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.category-tabs::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* 品項列表 */
.item-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .15s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:#FFF5F0;}
.item-left{flex:1;}
.item-name{font-size:.95rem;font-weight:600;}
.item-price-tag{font-size:.82rem;color:var(--primary);margin-top:3px;}
.item-add-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:1.3rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.item-add-btn:hover{background:var(--primary);color:#fff;}

/* 購物車品項 */
.cart-items{margin-top:10px;}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#FFF5F0;border-radius:10px;margin-bottom:8px;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:.88rem;font-weight:600;}
.cart-item-detail{font-size:.75rem;color:var(--muted);margin-top:2px;line-height:1.5;}
.cart-item-price{font-size:.9rem;font-weight:700;color:var(--primary);margin-right:10px;}
.cart-item-remove{background:none;border:none;color:#ccc;font-size:1.2rem;cursor:pointer;padding:0 4px;}
.cart-item-remove:hover{color:#e74c3c;}
.cart-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:20px 0;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px 20px 32px;transform:translateY(100%);transition:transform .3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.modal-title{font-size:1.1rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1;}
.modal-base-price{font-size:.9rem;color:var(--primary);font-weight:700;margin-bottom:16px;}
.modal-section{margin-bottom:18px;}
.modal-section-title{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-section-title.highlight{color:#E67E22;}
.option-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.option-btn{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:.85rem;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;}
.option-btn:hover{border-color:var(--primary-light);}
.option-btn.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700;}
.option-btn .opt-price{display:block;font-size:.72rem;color:var(--primary);margin-top:2px;}
.option-btn.selected .opt-price{color:var(--primary-dark);}
.modal-confirm-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;transition:background .2s;}
.modal-confirm-btn:hover{background:var(--primary-dark);}

/* 底部 */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -4px 20px rgba(0,0,0,.1);padding:14px 20px;z-index:100;}
.cart-bar-inner{max-width:480px;margin:0 auto;}
.cart-summary{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.85rem;color:var(--muted);}
.cart-total{font-weight:700;color:var(--primary);font-size:1rem;}
.submit-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;}
.submit-btn:hover{background:var(--primary-dark);}
.submit-btn:disabled{background:#CCC;cursor:not-allowed;}

/* 成功畫面 */
.success-screen{text-align:center;padding:60px 20px;display:none;}
.success-screen .success-icon{font-size:5rem;margin-bottom:16px;}
.success-screen h2{font-size:1.5rem;font-weight:700;margin-bottom:8px;}
.success-screen p{color:var(--muted);line-height:1.7;}
.order-receipt{background:var(--primary-light);border-radius:var(--radius);padding:16px;margin-top:20px;text-align:left;font-size:.88rem;line-height:1.9;}

.alert{background:#FFF3CD;border:1px solid #FFD580;border-radius:10px;padding:10px 14px;font-size:.83rem;color:#7A5C00;margin-bottom:12px;display:none;}
.hidden{display:none;}
.note-field{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;resize:none;outline:none;background:#FAFAFA;transition:border-color .2s;}
.note-field:focus{border-color:var(--primary);background:#fff;}
</style>
</head>

<div class="header">
  <span class="header-emoji">🍳</span>
  <h1>早餐點餐系統</h1>
  <p>Pan 幫你帶早餐</p>
  <div class="deadline-badge">截止時間：每日 08:30</div>
</div>
<main>

    <h2>點餐成功！</h2>

    <div class="order-receipt" id="orderReceipt"></div>
  </div>
  <div id="orderForm">
    <div class="alert" id="alertBox"></div>
    <div class="card">
      <div class="card-label">你叫什麼名字？</div>
      <input class="input-field" id="userName" type="text" placeholder="輸入你的名字" maxlength="20"/>
    </div>
    <div class="card">
      <div class="card-label">選擇早餐店</div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
    <div class="card hidden" id="menuCard">
      <div class="card-label">選擇品項</div>
      <div class="category-tabs" id="categoryTabs"></div>
      <div id="menuContainer"></div>
    </div>
    <div class="card hidden" id="cartCard">
      <div class="card-label">已選品項</div>
      <div class="cart-items" id="cartItems"></div>
    </div>
    <div class="card hidden" id="noteCard">
      <div class="card-label">備註（可略）</div>
      <textarea class="note-field" id="orderNote" rows="2" placeholder="例：少甜、去冰、不要辣..."></textarea>
    </div>
  </div>
</main>

<!-- 品項選項 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-base-price" id="modalBasePrice"></div>
    <div id="modalContent"></div>
    <button class="modal-confirm-btn" id="modalConfirmBtn" onclick="confirmItem()">加入點餐</button>
  </div>
</div>

<div class="cart-bar" id="cartBar">

    <div class="cart-summary">

    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">確認送出點餐</button>
  </div>
</div>

// ── 狀態 ──
let selectedShop = null;
let currentCategory = null;
let cartList = []; // [{name, options, price, total}]
let currentItem = null;
let currentSelections = {};

// ── 初始化店家 ──
function initShops(){
  const grid = document.getElementById("shopGrid");
  SHOPS.forEach(shop=>{
    const btn = document.createElement("button");
    btn.className = "shop-btn";
    btn.dataset.shopId = shop.id;
    btn.innerHTML = `<span class="shop-icon">${shop.icon}</span><div class="shop-name">${shop.name}</div><div class="shop-tag">${shop.tag}</div>`;
    btn.onclick = ()=>selectShop(shop.id);
    grid.appendChild(btn);
  });
}

function selectShop(shopId){
  selectedShop = SHOPS.find(s=>s.id===shopId);
  cartList = [];
  document.querySelectorAll(".shop-btn").forEach(b=>b.classList.remove("selected"));
  document.querySelector(`[data-shop-id="${shopId}"]`).classList.add("selected");
  document.getElementById("menuCard").classList.remove("hidden");
  document.getElementById("noteCard").classList.remove("hidden");
  currentCategory = Object.keys(selectedShop.categories)[0];
  renderCategoryTabs();
  renderMenu();
  renderCart();
  setTimeout(()=>document.getElementById("menuCard").scrollIntoView({behavior:"smooth",block:"start"}),100);
}

function renderCategoryTabs(){
  const tabs = document.getElementById("categoryTabs");
  tabs.innerHTML = "";
  Object.keys(selectedShop.categories).forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat===currentCategory?" active":"");
    btn.textContent = cat;
    btn.onclick = ()=>{ currentCategory=cat; renderCategoryTabs(); renderMenu(); };
    tabs.appendChild(btn);
  });
}

function renderMenu(){
  const container = document.getElementById("menuContainer");
  container.innerHTML = "";
  const items = selectedShop.categories[currentCategory]||[];
  items.forEach(item=>{
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML = `
      <div class="item-left">
        <div class="item-name">${item.name}</div>
        <div class="item-price-tag">$${item.price}</div>
      </div>
      <button class="item-add-btn" title="選擇">+</button>`;
    row.querySelector(".item-add-btn").onclick = ()=>openModal(item);
    container.appendChild(row);
  });
}

// ── Modal ──
function openModal(item){
  currentItem = item;
  currentSelections = {};
  document.getElementById("modalTitle").textContent = item.name;
  document.getElementById("modalBasePrice").textContent = item.variants ? "請先選擇種類" : `基本價格：$${item.price}`;

  const content = document.getElementById("modalContent");
  content.innerHTML = "";

  // 種類選擇（variants）
  if(item.variants && item.variants.length){
    const sec = makeSec("選擇種類", true);
    const grid = document.createElement("div"); grid.className = "option-grid";
    item.variants.forEach(v=>{
      const btn = makeOptionBtn(v.name, "variant", "variant_"+v.name, true, v.price);
      btn.onclick = ()=>{
        selectSingleOption("variant","variant_"+v.name, v.name, v.price);
        document.getElementById("modalBasePrice").textContent = `${v.name}：$${v.price}`;
        updateTotal();
      };
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    content.appendChild(sec);
  }

  // 飲料品項選擇（drinkVariants：先選品項，再選杯型）
  if(item.drinkVariants && item.drinkVariants.length){
    const sec = makeSec("選擇飲料", true);
    const grid = document.createElement("div"); grid.className = "option-grid";
    item.drinkVariants.forEach(dv=>{
      const btn = makeOptionBtn(dv.name, "drinkitem", "drinkitem_"+dv.name, true, 0);
      btn.onclick = ()=>{
        document.querySelectorAll(`[data-group^="drinkitem_"]`).forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        currentSelections["drinkitem"] = {label:"飲料", value:dv.name, price:0, _isDrinkName:true};
        // 清掉舊的杯型選擇，重新畫杯型選項
        delete currentSelections["size"];
        renderSizeOptions(dv);
        renderIceOptions(dv);
        updateTotal();
      };
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    content.appendChild(sec);

    // 杯型容器（先建立空容器，選了品項後才填入）
    const sizeSec = makeSec("選擇杯型", true);
    sizeSec.id = "sizeSection";
    const sizeGrid = document.createElement("div"); sizeGrid.className = "option-grid"; sizeGrid.id = "sizeGrid";
    sizeSec.appendChild(sizeGrid);
    sizeSec.style.display = "none";
    content.appendChild(sizeSec);
  }

  // 加料
  if(item.addons && item.addons.length){
    const sec = makeSec("加料選擇", false);
    const grid = document.createElement("div"); grid.className = "option-grid";
    item.addons.forEach(addon=>{
      const btn = makeOptionBtn(addon.label + (addon.price?` (+$${addon.price})`:""), addon.key, "addon_"+addon.key, false, addon.price);
      btn.onclick = ()=>{ toggleCheckOption("addon_"+addon.key, addon.key, addon.price, btn); updateTotal(); };
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    content.appendChild(sec);
  }

  // 辣度
  if(item.spicy){
    const sec = makeSec("辣度", true);
    const grid = document.createElement("div"); grid.className = "option-grid";
    SPICY.options.forEach(opt=>{
      const btn = makeOptionBtn(opt.name, "spicy", "spicy_"+opt.name, true, 0);
      btn.onclick = ()=>{ selectSingleOption("spicy", "spicy_"+opt.name, opt.name, 0); updateTotal(); };
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    content.appendChild(sec);
    // 預設不辣
    currentSelections["spicy"] = {label:"辣度", value:"不辣", price:0};
    setTimeout(()=>{
      const first = content.querySelector("[data-group='spicy_不辣']");
      if(first) first.classList.add("selected");
    },0);
  }

  // 飲料冰塊（含熱，可依品項限制只有冰）
  if(item.drink){
    const secI = makeSec("冰塊", true);
    secI.id = "iceSection";
    const gridI = document.createElement("div"); gridI.className = "option-grid"; gridI.id = "iceGrid";
    secI.appendChild(gridI);
    content.appendChild(secI);
    renderIceOptions(null); // 尚未選飲料款式時，預設顯示全部
  }

  // 升級套餐（飲料本身不顯示套餐升級）
  if(selectedShop.combo && !item.drink){
    const sec = makeSec("⭐ 升級套餐（選一）", false);
    sec.querySelector(".modal-section-title").classList.add("highlight");
    const grid = document.createElement("div"); grid.className = "option-grid";
    selectedShop.combo.forEach(combo=>{
      const btn = makeOptionBtn(combo.name,"combo","combo_"+combo.name,true,combo.price);
      btn.style.gridColumn = "1/-1";
      btn.onclick = ()=>{
        selectSingleOption("combo","combo_"+combo.name,combo.name,combo.price);
        delete currentSelections["comboSwap"];
        renderComboSwapOptions(true);
        updateTotal();
      };
      grid.appendChild(btn);
    });
    // 不升級選項
    const noBtn = makeOptionBtn("不升級套餐","combo","combo_none",true,0);
    noBtn.style.gridColumn = "1/-1";
    noBtn.onclick = ()=>{
      selectSingleOption("combo","combo_none","不升級",0);
      delete currentSelections["comboSwap"];
      renderComboSwapOptions(false);
      updateTotal();
    };
    grid.appendChild(noBtn);
    sec.appendChild(grid);
    content.appendChild(sec);
    currentSelections["combo"] = {label:"套餐", value:"不升級", price:0};
    setTimeout(()=>{
      const none = content.querySelector("[data-group='combo_none']");
      if(none) none.classList.add("selected");
    },0);

    // 套餐換飲料補差價（容器）
    const swapSec = makeSec("套餐飲料更換（補差價，可略）", false);
    swapSec.id = "comboSwapSection";
    const swapGrid = document.createElement("div"); swapGrid.className = "option-grid"; swapGrid.id = "comboSwapGrid";
    swapSec.appendChild(swapGrid);
    swapSec.style.display = "none";
    content.appendChild(swapSec);
  }

  updateTotal();
  document.getElementById("modalOverlay").classList.add("open");
}

function makeSec(title, required){
  const sec = document.createElement("div"); sec.className = "modal-section";
  const t = document.createElement("div"); t.className = "modal-section-title";
  t.textContent = title + (required?" *":"");
  sec.appendChild(t);
  return sec;
}

function renderIceOptions(drinkVariant){
  const gridI = document.getElementById("iceGrid");
  if(!gridI) return;
  gridI.innerHTML = "";
  delete currentSelections["ice"];

  const iceOnly = drinkVariant && drinkVariant.iceOnly;
  const opts = iceOnly ? ICE.options.filter(o=>o.name==="冰") : ICE.options;

  opts.forEach(opt=>{
    const btn = makeOptionBtn(opt.name,"ice","ice_"+opt.name,true,0);
    btn.onclick = ()=>{ selectSingleOption("ice","ice_"+opt.name,opt.name,0); updateTotal(); };
    gridI.appendChild(btn);
  });

  // 預設選第一個
  const defaultOpt = opts[0];
  if(defaultOpt){
    currentSelections["ice"] = {label:"冰塊", value:defaultOpt.name, price:0};
    setTimeout(()=>{
      const fi = document.querySelector(`[data-group='ice_${defaultOpt.name}']`);
      if(fi) fi.classList.add("selected");
    },0);
  }
}

function renderSizeOptions(drinkVariant){
  const sizeSection = document.getElementById("sizeSection");
  const sizeGrid = document.getElementById("sizeGrid");
  sizeGrid.innerHTML = "";
  sizeSection.style.display = "block";
  drinkVariant.sizes.forEach(sz=>{
    const btn = makeOptionBtn(sz.label, "size", "size_"+sz.label, true, sz.price);
    btn.onclick = ()=>{
      document.querySelectorAll(`[data-group^="size_"]`).forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      currentSelections["size"] = {label:"杯型", value:sz.label, price:sz.price, _isDrinkSize:true};
      document.getElementById("modalBasePrice").textContent = `${drinkVariant.name} ${sz.label}：$${sz.price}`;
      updateTotal();
    };
    sizeGrid.appendChild(btn);
  });
}

function renderComboSwapOptions(show){
  const sec = document.getElementById("comboSwapSection");
  const grid = document.getElementById("comboSwapGrid");
  if(!sec) return;
  grid.innerHTML = "";
  if(!show){ sec.style.display = "none"; return; }
  sec.style.display = "block";

  const baseDrinkPrice = findBaseComboDrinkPrice();

  const keepBtn = makeOptionBtn("維持原飲料(中杯紅茶)","comboSwap","comboSwap_keep",true,0);
  keepBtn.style.gridColumn = "1/-1";
  keepBtn.onclick = ()=>{
    document.querySelectorAll(`[data-group^="comboSwap_"]`).forEach(b=>b.classList.remove("selected"));
    keepBtn.classList.add("selected");
    delete currentSelections["comboSwap"];
    updateTotal();
  };
  grid.appendChild(keepBtn);
  keepBtn.classList.add("selected");

  const drinkCategory = Object.values(selectedShop.categories).flat().find(i=>i.drinkVariants);
  if(drinkCategory){
    drinkCategory.drinkVariants.forEach(dv=>{
      dv.sizes.forEach(sz=>{
        const diff = sz.price - baseDrinkPrice;
        if(diff===0 && dv.name==="紅茶" && sz.label==="中杯") return;
        const label = `${dv.name}(${sz.label})` + (diff>0?` 補差價+$${diff}`:diff<0?` 退差$${Math.abs(diff)}`:` 同價`);
        const btn = makeOptionBtn(label,"comboSwap","comboSwap_"+dv.name+sz.label,true,diff);
        btn.style.gridColumn = "1/-1";
        btn.onclick = ()=>{
          document.querySelectorAll(`[data-group^="comboSwap_"]`).forEach(b=>b.classList.remove("selected"));
          btn.classList.add("selected");
          currentSelections["comboSwap"] = {label:"套餐換飲料", value:`${dv.name}(${sz.label})`, price:diff};
          updateTotal();
        };
        grid.appendChild(btn);
      });
    });
  }
}

function findBaseComboDrinkPrice(){
  const drinkCategory = Object.values(selectedShop.categories).flat().find(i=>i.drinkVariants);
  if(!drinkCategory) return 20;
  const teaVariant = drinkCategory.drinkVariants.find(dv=>dv.name==="紅茶");
  if(!teaVariant) return 20;
  const midSize = teaVariant.sizes.find(sz=>sz.label==="中杯");
  return midSize ? midSize.price : 20;
}

function makeOptionBtn(label, group, groupKey, single, price){
  const btn = document.createElement("button");
  btn.className = "option-btn";
  btn.dataset.group = groupKey;
  btn.innerHTML = label + (price?`<span class="opt-price">+$${price}</span>`:"");
  return btn;
}

function toggleCheckOption(groupKey, key, price, btn){
  if(currentSelections[key]){
    delete currentSelections[key];
    btn.classList.remove("selected");
  } else {
    currentSelections[key] = {label:key, value:"是", price:price};
    btn.classList.add("selected");
  }
}

function selectSingleOption(group, groupKey, value, price){
  // 清除同群組選擇
  document.querySelectorAll(`[data-group^="${group}_"]`).forEach(b=>b.classList.remove("selected"));
  const btn = document.querySelector(`[data-group="${groupKey}"]`);
  if(btn) btn.classList.add("selected");
  const labels = {spicy:"辣度", ice:"冰塊", sweet:"甜度", combo:"套餐", variant:"種類"};
  currentSelections[group] = {label:labels[group]||group, value, price};
}

function updateTotal(){
  let total = (currentItem.variants || currentItem.drinkVariants) ? 0 : currentItem.price;
  Object.entries(currentSelections).forEach(([key,s])=>{ total += s.price||0; });
  document.getElementById("modalConfirmBtn").textContent = `加入點餐  $${total}`;
}

function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
}

function confirmItem(){
  if(currentItem.variants && !currentSelections["variant"]){
    showAlert("⚠️ 請先選擇種類");
    return;
  }
  if(currentItem.drinkVariants && (!currentSelections["drinkitem"] || !currentSelections["size"])){
    showAlert("⚠️ 請選擇飲料品項與杯型");
    return;
  }
  let total = (currentItem.variants || currentItem.drinkVariants) ? 0 : currentItem.price;
  Object.values(currentSelections).forEach(s=>{ total += s.price||0; });

  let displayName = currentItem.name;
  if(currentSelections["variant"]){
    displayName = currentItem.name + "（" + currentSelections["variant"].value + "）";
  }
  if(currentSelections["drinkitem"] && currentSelections["size"]){
    displayName = currentSelections["drinkitem"].value + "(" + currentSelections["size"].value + ")";
  }

  const optLines = Object.entries(currentSelections)
    .filter(([key,s])=>key!=="variant" && key!=="drinkitem" && key!=="size" && s.value && s.value!=="不升級")
    .map(([key,s])=>s.label+"："+s.value+(s.price?` (+$${s.price})`:""))
    .join("、");

  cartList.push({
    name: displayName,
    options: optLines,
    price: total,
    rawSelections: {...currentSelections}
  });

  closeModal();
  renderCart();
  updateCartBar();
}

function renderCart(){
  const card = document.getElementById("cartCard");
  const container = document.getElementById("cartItems");

  if(cartList.length===0){
    card.classList.add("hidden");
    return;
  }
  card.classList.remove("hidden");
  container.innerHTML = "";
  cartList.forEach((item,idx)=>{
    const el = document.createElement("div");
    el.className = "cart-item";
    el.innerHTML = `
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        ${item.options?`<div class="cart-item-detail">${item.options}</div>`:""}
      </div>
      <div class="cart-item-price">$${item.price}</div>
      <button class="cart-item-remove" onclick="removeCartItem(${idx})">✕</button>`;
    container.appendChild(el);
  });
}

function removeCartItem(idx){
  cartList.splice(idx,1);
  renderCart();
  updateCartBar();
}

function updateCartBar(){
  const total = cartList.reduce((s,i)=>s+i.price,0);
  const countEl = document.getElementById("cartCount");
  const totalEl = document.getElementById("cartTotal");
  if(cartList.length===0){ countEl.textContent="尚未選擇品項"; totalEl.textContent=""; }
  else { countEl.textContent=`已選 ${cartList.length} 項`; totalEl.textContent=`合計 $${total}`; }
}

function showAlert(msg){
  const el = document.getElementById("alertBox");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(()=>el.style.display="none",3000);
}

async function submitOrder(){
  const name = document.getElementById("userName").value.trim();
  const note = document.getElementById("orderNote").value.trim();
  if(!name){ showAlert("⚠️ 請輸入你的名字"); return; }
  if(!selectedShop){ showAlert("⚠️ 請選擇早餐店"); return; }
  if(cartList.length===0){ showAlert("⚠️ 請至少選擇一個品項"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "送出中...";

  const totalPrice = cartList.reduce((s,i)=>s+i.price,0);
  const items = cartList.map(i=>({
    name: i.name + (i.options?` (${i.options})`:""),
    qty: 1,
    price: i.price
  }));

  const payload = {
    name, shop: selectedShop.name, items, totalPrice, note,
    timestamp: new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})
  };

  try {
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    showSuccess(payload);
  } catch(e){
    alert("送出失敗，請截圖傳給 Pan 😢");
    btn.disabled=false; btn.textContent="確認送出點餐";
  }
}

function showSuccess(payload){
  document.getElementById("orderForm").style.display="none";
  document.getElementById("cartBar").style.display="none";
  const screen = document.getElementById("successScreen");
  screen.style.display="block";
  document.getElementById("orderReceipt").innerHTML=`
    <b>📋 點餐明細</b><br>
    姓名：${payload.name}<br>
    店家：${payload.shop}<br>
    ──────────────<br>
    ${payload.items.map(i=>`${i.name}　<b>$${i.price}</b>`).join("<br>")}<br>
    ──────────────<br>
    合計：<b>$${payload.totalPrice}</b>
    ${payload.note?`<br>備註：${payload.note}`:""}`;
}

// 點擊 overlay 關閉
document.getElementById("modalOverlay").addEventListener("click",function(e){
  if(e.target===this) closeModal();
});

initShops();
</script>
